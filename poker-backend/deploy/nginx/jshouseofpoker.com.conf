map $http_upgrade $connection_upgrade {
  default upgrade;
  '' close;
}


server {
  listen 80;
  server_name jshouseofpoker.com www.jshouseofpoker.com;

  return 301 https://www.jshouseofpoker.com$request_uri;
}

server {
  listen 443 ssl http2;
  server_name jshouseofpoker.com;

  ssl_certificate /etc/letsencrypt/live/www.jshouseofpoker.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/www.jshouseofpoker.com/privkey.pem;

  return 301 https://www.jshouseofpoker.com$request_uri;
}

server {
  listen 443 ssl http2;
  server_name www.jshouseofpoker.com;

  ssl_certificate /etc/letsencrypt/live/www.jshouseofpoker.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/www.jshouseofpoker.com/privkey.pem;

  # Leave room for request framing above the backend's authoritative 50 MB attachment limit.
  client_max_body_size 60m;

  # Keep these routes ahead of the site fallback so preview APK REST calls
  # always reach poker-backend, even when `/` serves a separate web app.
  location ^~ /api/ {
    proxy_pass http://127.0.0.1:5000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 75s;
    proxy_send_timeout 75s;
  }

  # Socket.IO starts with HTTP polling and may upgrade to a websocket, so its
  # public path must be forwarded separately with upgrade headers intact.
  location ^~ /socket.io/ {
    proxy_pass http://127.0.0.1:5000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_buffering off;
    proxy_read_timeout 75s;
    proxy_send_timeout 75s;
  }

  location / {
    proxy_pass http://127.0.0.1:5000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 75s;
    proxy_send_timeout 75s;
  }
}

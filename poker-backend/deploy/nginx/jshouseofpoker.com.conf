map $http_upgrade $connection_upgrade {
  default upgrade;
  '' close;
}

upstream poker_backend {
  server 127.0.0.1:5000;
}

server {
  listen 80;
  server_name jshouseofpoker.com www.jshouseofpoker.com;

  return 301 https://www.jshouseofpoker.com$request_uri;
}

server {
  listen 443 ssl http2;
  server_name jshouseofpoker.com;

  ssl_certificate /etc/letsencrypt/live/www.jshouseofpoker.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/www.jshouseofpoker.com/privkey.pem;

  return 301 https://www.jshouseofpoker.com$request_uri;
}

server {
  listen 443 ssl http2;
  server_name www.jshouseofpoker.com;

  ssl_certificate /etc/letsencrypt/live/www.jshouseofpoker.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/www.jshouseofpoker.com/privkey.pem;

  client_max_body_size 10m;

  location / {
    proxy_pass http://poker_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_read_timeout 75s;
    proxy_send_timeout 75s;
  }
}
